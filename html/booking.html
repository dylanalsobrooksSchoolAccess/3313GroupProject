<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book a Bartender</title>
    <!-- bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- google fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>

    <div id="nav-container" class="sticky-top"><!-- top navbar --></div>
    <div class="container-fluid">
        <div class="row">
            <div id="sidebar-container" class="col-lg-2 sidebar py-4 d-none d-lg-block"><!-- sidebar --></div>

            <!-- main content -->
            <div class="col-lg-10 py-5">

                <!-- hero -->
                <div class="text-center mb-5">
                    <h1 class="display-4 fw-bold">Book a Bartender</h1>
                    <h5 class="text-muted fw-normal mt-2">Request a Quote</h5>
                </div>

                
                <form action="http://www.randyconnolly.com/tests/process.php" method="POST">
                    <!-- event information -->
                    <div class="card bg-light shadow-sm mx-auto mb-4 bookingCard">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Event Information</h2>

                            <div class="mb-3">
                                <label for="event-type" class="form-label form-input-titles">Type of Event:</label>
                                <select id="event-type" name="event-type" class="form-select form-dropdown">
                                    <option value="null">Select...</option>
                                    <option value="event-type-wedding">Wedding</option>
                                    <option value="event-type-corporate">Corporate</option>
                                    <option value="event-type-private">Private</option>
                                    <option value="event-type-other">Other</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="event-date" class="form-label form-input-titles">Date of Event:</label>
                                <input type="date" id="event-date" name="event-date" class="form-control form-input">
                            </div>

                            <div class="mb-3">
                                <label for="event-time" class="form-label form-input-titles">Start Time:</label>
                                <input type="time" id="event-time" name="event-time" class="form-control form-input">
                            </div>

                            <div class="mb-3">
                                <label for="guest-count" class="form-label form-input-titles">Estimated Guest Count:</label>
                                <input type="number" id="guest-count" name="guest-count" class="form-control form-input">
                            </div>
                        </div>
                    </div>

                    <!-- party preferences -->
                    <div class="card bg-light shadow-sm mx-auto mb-4 bookingCard">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Party Preferences</h2>

                            <div class="mb-4">
                                <label class="form-label fw-bold form-input-titles">Do You Need Glassware Rental?</label>
                                <div class="form-check">
                                    <input type="radio" id="radio-yes" name="glassware" class="form-check-input form-radio" value="Yes - Glassware Needed">
                                    <label for="radio-yes" class="form-check-label form-radio-labels">Yes</label>
                                </div>
                                <div class="form-check">
                                    <input type="radio" id="radio-no" name="glassware" class="form-check-input form-radio" value="No - Glassware NOT Needed">
                                    <label for="radio-no" class="form-check-label form-radio-labels">No</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold form-input-titles">Preferred Base Spirits:</label>
                                <div class="form-check">
                                    <input id="checkbox-vodka" type="checkbox" value="Vodka" name="base-spirits[]" class="form-check-input form-checkbox">
                                    <label for="checkbox-vodka" class="form-check-label form-checkbox-labels">Vodka</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" id="checkbox-tequila" value="Tequila" name="base-spirits[]" class="form-check-input form-checkbox">
                                    <label for="checkbox-tequila" class="form-check-label form-checkbox-labels">Tequila</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" id="checkbox-whiskey" value="Whiskey" name="base-spirits[]" class="form-check-input form-checkbox">
                                    <label for="checkbox-whiskey" class="form-check-label form-checkbox-labels">Whiskey</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" id="checkbox-rum" value="Rum" name="base-spirits[]" class="form-check-input form-checkbox">
                                    <label for="checkbox-rum" class="form-check-label form-checkbox-labels">Rum</label>
                                </div>
                                <div class="form-check">
                                    <input type="checkbox" id="checkbox-gin" value="Gin" name="base-spirits[]" class="form-check-input form-checkbox">
                                    <label for="checkbox-gin" class="form-check-label form-checkbox-labels">Gin</label>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- customer requests -->
                    <div class="card bg-light shadow-sm mx-auto mb-4 bookingCard">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Custom Requests</h2>
                            <div class="mb-3">
                                <label for="special-requests" class="form-label form-input-titles">Custom Cocktail Requests (e.g., Themed Drinks and Menus):</label>
                                <textarea id="special-requests" name="special-requests" class="form-control form-textarea" rows="4" placeholder="Custom Drink Order..."></textarea>
                            </div>
                        </div>
                    </div>

                        <!-- contact information -->
                        <div class="card bg-light shadow-sm mx-auto mb-4 bookingCard">
                            <div class="card-body p-4">
                                <h2 class="h4 text-center mb-4">Contact Information</h2>

                                <div class="mb-3">
                                    <label for="first-name" class="form-label form-input-titles">First Name:</label>
                                    <input type="text" id="first-name" name="first-name" class="form-control form-input">
                                </div>

                                <div class="mb-3">
                                    <label for="last-name" class="form-label form-input-titles">Last Name:</label>
                                    <input type="text" id="last-name" name="last-name" class="form-control form-input">
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label form-input-titles">Email Address:</label>
                                    <input type="email" id="email" name="email" class="form-control form-input">
                                </div>

                                <div class="mb-3">
                                    <label for="phone" class="form-label form-input-titles">Phone Number:</label>
                                    <input type="tel" id="phone" name="phone" class="form-control form-input">
                                </div>
                            </div>
                        </div>

                        <div id="error-messages" name="error-messages" class="error-text text-danger text-center mb-3"><!-- red error text --></div>

                        <!-- submit button -->
                        <div class="text-center">
                            <button type="submit" id="submit-btn" class="btn btn-dark btn-lg px-5 shadow-sm">Get Quote</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <div id="footer-container"><!-- footer --></div>

    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
</body>
</html>
