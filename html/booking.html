<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking</title>

</head>



<body>
    <form>
        <form action="http://www.randyconnolly.com/tests/process.php" method="POST"></form>
        <div>
            <h2>Contact information</h2>
            <label for="first-name" class="form-input-titles">First Name:</label><br>
            <input type="text" id="first-name" class="form-input"> <br>

            <label for="last-name" class="form-input-titles">Last Name:</label><br>
            <input type="text" id="last-name" class="form-input"> <br>

            <label for="email" class="form-input-titles">Email Address:</label><br>
            <input type="email" id="email" class="form-input"> <br>

            <label for="phone" class="form-input-titles">Phone Number:</label><br>
            <input type="tel" id="phone" class="form-input"> <br>

        </div>

        <hr> <!-- TODO: Remove Later -->

        <div>
            <h2>Event Information</h2>
            <label for="event-type" class="form-input-titles">Type of Event:</label><br>
            <select id="event-type" class="form-dropdown"> <br>
                <optgroup>
                    <option value="null">Select...</option>
                    <option value="event-type-wedding">Wedding</option>
                    <option value="event-type-corporate">Corporate</option>
                    <option value="event-type-private">Private</option>
                    <option value="event-type-other">Other</option>
                </optgroup>
            </select> <br>

            <label for="event-date" class="form-input-titles">Date of Event:</label><br>
            <input type="date" id="event-date" class="form-input"> <br>

            <label for="event-time" class="form-input-titles">Start Time:</label><br>
            <input type="time" id="event-time" class="form-input"> <br>

            <label for="guest-count" class="form-input-titles">Estimated Guest Count:</label><br>
            <input type="number" id="guest-count" class="form-input"> <br>
        </div>

        <hr> <!-- TODO: Remove Later -->

        <div>
            <h2>Party Preferences</h2>
            <!-- TODO: come up with better class name than 'form-input-titles'-->
            <label for="radio-group" class="form-input-titles">Do You Need Glassware Rental?</label><br>

            <input type="radio" id="radio-yes" name="glassware" class="form-radio" value="Yes - Glassware Needed">
            <label for="radio-yes" class="form-radio-labels">Yes</label><br>

            <input type="radio" id="radio-no" name="no-glassware" class="form-radio" value="No - Glassware NOT Needed">
            <label for="radio-no" class="form-radio-labels">No</label><br>

        </div>

        <hr> <!-- TODO: Remove Later -->

        <div>
            <label for="liqour-preference" class="form-input-titles">Preferred Base Spirits:</label><br>

            <input id="checkbox-vodka" type="checkbox" class="form-checkbox">
            <label for="checkbox-vodka" class="form-checkbox-labels">Vodka</label> <br>

            <input type="checkbox" id="checkbox-tequila" class="form-checkbox">
            <label for="checkbox-tequila" class="form-checkbox-labels">Tequila</label> <br>

            <input type="checkbox" id="checkbox-whiskey" class="form-checkbox">
            <label for="checkbox-whiskey" class="form-checkbox-labels">Whiskey</label> <br>

            <input type="checkbox" id="checkbox-rum" class="form-checkbox">
            <label for="checkbox-rum" class="form-checkbox-labels">Rum</label> <br>

            <input type="checkbox" id="checkbox-gin" class="form-checkbox">
            <label for="checkbox-gin" class="form-checkbox-labels">Gin</label> <br>
        </div>

        <hr> <!-- TODO: Remove Later -->

        <div>
            <label for="special-requests" class="form-input-titles">Custom Cocktail Requests (e.g., Themed Drinks and
                Menus):</label> <br>
            <textarea id="special-requests" class="form-textarea" placeholder="Custom Drink Order..."></textarea> <br>
        </div>

        <hr> <!-- TODO: Remove Later -->

        <div id="error-messages" class="error-text"> <!-- TODO: Make Error Text Red!-->

        </div>

        <!-- Submit Button: -->
        <button type="submit" id="submit-btn" class="btn-primary">Get Quote</button>
    </form>
</body>

</html>
