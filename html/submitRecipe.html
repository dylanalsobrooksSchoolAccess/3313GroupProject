<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit a Recipe!</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <div id="nav-container" class="sticky-top"><!-- top navbar injected here --></div>

    <div class="container-fluid">
        <div class="row">
            
            <div id="sidebar-container" class="col-lg-2 sidebar py-4 d-none d-lg-block"><!-- sidebar injected here --></div>



            <!-- Main Content -->
            <div class="col-lg-10 py-5">
                <div class="text-center mb-5">

                    <h1 class="display-4 fw-bold">
                        Submit a Recipe!
                        <h5 class="text-muted fw-normal mt-2">Send us your recipe for a chance to be featured as the Drink of the Week!</h5>
                    </h1>
                </div>
                
                    <!-- recipe info card -->
                    <div class="card bg-light shadow-sm mx-auto mb-4" style="max-width: 1000px;">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Recipe Information</h2>

                            <div class="mb-3">
                                <label for="drink-name" class="form-input-titles">Drink Name:</label><br>
                                <input type="text" id="drink-name" class="form-input"> <br>
                            </div>

                            <div class="mb-3">
                                <label for="drink-ingredients" class="form-input-titles">Drink Ingredients:</label><br>
                                <textarea id="drink-ingredients" class="form-control form-textarea" rows="4" placeholder="Drink Ingredients..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="drink-description" class="form-input-titles">Drink Description:</label><br>
                                <textarea id="drink-description" class="form-control form-textarea" rows="4" placeholder="Drink Description..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="drink-notes" class="form-input-titles">Additional Notes:</label><br>
                                <textarea id="drink-notes" class="form-control form-textarea" rows="4" placeholder="Additional Notes..."></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Contact Information Card -->
                    <div class="card bg-light shadow-sm mx-auto mb-4" style="max-width: 1000px;">
                        <div class="card-body p-4">
                            <h2 class="h4 text-center mb-4">Contact Information</h2>

                            <div class="mb-3">
                                <label for="first-name" class="form-label form-input-titles">First Name:</label>
                                <input type="text" id="first-name" class="form-control form-input">
                            </div>

                            <div class="mb-3">
                                <label for="last-name" class="form-label form-input-titles">Last Name:</label>
                                <input type="text" id="last-name" class="form-control form-input">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label form-input-titles">Email Address:</label>
                                <input type="email" id="email" class="form-control form-input">
                            </div>

                            <div class="mb-3">
                                <label for="phone" class="form-label form-input-titles">Phone Number:</label>
                                <input type="tel" id="phone" class="form-control form-input">
                            </div>
                        </div>
                    </div>

                    <div class="text-center">
                    <button type="submit" id="submit-btn" class="btn btn-dark btn-lg px-5 shadow-sm">Submit!</button>

            </div>
        </div>
    </div>

    <div id="footer-container"><!-- footer injected here --></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
</body>

</html>
