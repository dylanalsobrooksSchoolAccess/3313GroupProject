<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Submit a Recipe!</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>
    <div id="nav-container"><!-- top navbar injected here --></div>

    <div class="container-fluid">
        <div class="row">
            
            <div id="sidebar-container" class="col-lg-2 sidebar py-4 d-none d-lg-block"><!-- sidebar injected here --></div>



            <!-- Main Content -->
            <div class="col-lg-10 py-5">
                <div class="text-center mb-5">

                    <h1 class="display-4 fw-bold">
                        Submit a Recipe!
                        <h5>Send us your recipe for a chance to be featured as the Drink of the Week!</h5>
                    </h1>
                </div>

                <hr>



                
                    <!-- Recipe Submission Form -->
                    <div class="">

                        <form action="http://www.randyconnolly.com/tests/process.php" method="POST">
                        <div>
                            <h2>Contact information</h2>
                            <label for="first-name" class="form-input-titles">First Name:</label><br>
                            <input type="text" id="first-name" class="form-input"> <br>

                            <label for="last-name" class="form-input-titles">Last Name:</label><br>
                            <input type="text" id="last-name" class="form-input"> <br>

                            <label for="email" class="form-input-titles">Email Address:</label><br>
                            <input type="email" id="email" class="form-input"> <br>

                            <label for="phone" class="form-input-titles">Phone Number:</label><br>
                            <input type="tel" id="phone" class="form-input"> <br>
                        </div>

                        <div>
                            <h2>Recipe information</h2>
                            <label for="drink-name" class="form-input-titles">Drink Name:</label><br>
                            <input type="text" id="drink-name" class="form-input"> <br>

                            <label for="drink-description" class="form-input-titles">Drink Description:</label><br>
                            <input type="text" id="drink-description" class="form-input"> <br>

                            <label for="drink-ingredients" class="form-input-titles">Drink Ingredients:</label><br>
                            <input type="text" id="drink-ingredients" class="form-input"> <br>

                            <label for="drink-notes" class="form-input-titles">Additional Notes:</label><br>
                            <input type="text" id="drink-notes" class="form-input"> <br>
                        </div>
                    </div>

                    <br><button>Submit!</button>
                    <!-- /Recipe Submission form-->

            </div>
        </div>
    </div>

    <div id="footer-container"><!-- footer injected here --></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/ui.js"></script>
</body>

</html>
